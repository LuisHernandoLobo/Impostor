<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impostor Lobito ULTRA DIOS</title>
<style>
body,html{margin:0;padding:0;font-family:sans-serif;background:#000;color:#fff;overflow:hidden}
.container{display:none;justify-content:center;align-items:center;height:100vh;flex-direction:column}
#bgImage{position:fixed;width:100%;height:100%;background-size:cover;background-position:center;z-index:-1;transition:all .5s}
.card-container{width:min(90vw,320px);aspect-ratio:2/3}
.card{width:100%;height:100%;background:#111;border-radius:12px;display:flex;align-items:center;justify-content:center}

/* emociones */
body.calm #bgImage{filter:brightness(.8)}
body.mystery #bgImage{filter:brightness(.6) hue-rotate(40deg)}
body.tension #bgImage{filter:brightness(.5)}
body.chaos #bgImage{filter:brightness(.4) contrast(1.5)}
body.climax #bgImage{filter:brightness(.3)}
body.epic #bgImage{filter:brightness(.9)}

.shockwave{position:fixed;top:50%;left:50%;width:10px;height:10px;background:red;border-radius:50%;transform:translate(-50%,-50%);animation:shock .8s}
@keyframes shock{to{width:200vw;height:200vw;opacity:0}}

#ai-narrator{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:#000a;padding:10px;border-radius:20px;opacity:0;transition:.5s}
</style>
</head>
<body>

<div id="bgImage"></div>

<div id="ai-narrator"></div>

<div id="screen-start" class="container" style="display:flex">
<h1>Impostor Lobito</h1>
<button onclick="app.start()">Iniciar</button>
</div>

<div id="screen-game" class="container">
<div class="card-container">
<div class="card" id="card">JUEGO</div>
</div>
</div>

<script>
const app={
phaseBackgrounds:{
start:'fondo1.png',
game:'fondo2.png'
},
gameState:'lobby',
players:{},
gameData:{textWords:{}},

audioCtx:null,
initAudio(){
if(!this.audioCtx)this.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
},
playTone(f=440,d=.2,t='sine',v=.1){
this.initAudio();
const o=this.audioCtx.createOscillator();
const g=this.audioCtx.createGain();
o.type=t;o.frequency.value=f;g.gain.value=v;
o.connect(g);g.connect(this.audioCtx.destination);
o.start();o.stop(this.audioCtx.currentTime+d);
},

playEmotionFX(e){
if(e==='tension')this.playTone(300,.1,'sawtooth');
if(e==='chaos')this.playTone(200,.1,'square');
if(e==='climax')this.playTone(600,.2,'square');
if(e==='epic')this.playTone(800,.3,'triangle');
},

getGameEmotion(){
if(this.gameState==='lobby')return'calm';
if(this.gameState==='game')return'tension';
return'neutral';
},

setPhaseBackground(p){
document.getElementById('bgImage').style.backgroundImage=`url(${this.phaseBackgrounds[p]})`;
const e=this.getGameEmotion();
document.body.className=p+' '+e;
this.playEmotionFX(e);
if(e==='climax')this.triggerShockwave();
this.runNarrator();
},

triggerShockwave(){
const d=document.createElement('div');
d.className='shockwave';
document.body.appendChild(d);
setTimeout(()=>d.remove(),800);
},

speakAI(t){
const el=document.getElementById('ai-narrator');
el.innerText=t;
el.style.opacity=1;
setTimeout(()=>el.style.opacity=0,3000);
},

runNarrator(){
const e=this.getGameEmotion();
if(e==='tension')this.speakAI('Algo no cuadra...');
},

detectSuspiciousPlayerAdvanced(){
let max=null,scoreMax=-1;
for(let id in this.players){
let s=Math.random()*5;
if(s>scoreMax){scoreMax=s;max=id;}
}
return max;
},

start(){
this.gameState='game';
this.showScreen('screen-game');
},

showScreen(id){
document.querySelectorAll('.container').forEach(c=>c.style.display='none');
document.getElementById(id).style.display='flex';
this.setPhaseBackground(id==='screen-start'?'start':'game');
}
};
</script>

</body>
</html>
